<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>조명 릴스 — 전체 러프 컷 (최종 클립)</title>
<style>
  body{margin:0;background:#0b0c0f;color:#e8eaf0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;display:flex;flex-direction:column;align-items:center;padding:18px}
  h1{font-size:16px;margin:0 0 10px;color:#ffce4d}
  .phone{position:relative;width:340px;max-width:94vw;aspect-ratio:9/16;background:#000;border-radius:24px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.6);border:1px solid #222}
  video{width:100%;height:100%;object-fit:cover;display:block;background:#000}
  #cap{position:absolute;left:0;right:0;bottom:14%;text-align:center;font-weight:800;font-size:21px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.85);padding:0 18px;line-height:1.3;letter-spacing:-.3px}
  #cap .pill{background:rgba(255,206,77,.95);color:#111;padding:3px 12px;border-radius:8px;display:inline-block}
  #vo{position:absolute;left:0;right:0;bottom:6%;text-align:center;font-size:13px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.9);padding:0 20px;opacity:.95}
  #bars{position:absolute;top:8px;left:8px;right:8px;display:flex;gap:4px}
  #bars .b{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden}
  #bars .b .f{height:100%;width:0;background:#fff}
  #start{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:10px}
  #start .btn{width:64px;height:64px;border-radius:50%;background:#ffce4d;color:#111;display:flex;align-items:center;justify-content:center;font-size:28px}
  #start .t{font-size:13px;color:#ddd}
  .ctrls{margin-top:14px;display:flex;gap:8px}
  .ctrls button{background:#181a21;border:1px solid #2f3340;color:#e8eaf0;padding:8px 14px;border-radius:9px;font-size:13px;cursor:pointer}
  .note{color:#9aa0ad;font-size:12px;margin-top:10px;max-width:340px;line-height:1.5;text-align:center}
</style>
</head>
<body>
<h1>🎬 조명 릴스 — 전체 러프 컷 (최종 클립)</h1>
<div class="phone">
  <div id="bars"></div>
  <video id="v" muted playsinline preload="auto"></video>
  <div id="cap"></div>
  <div id="vo"></div>
  <div id="start"><div class="btn">▶</div><div class="t">탭하면 재생</div></div>
</div>
<div class="ctrls">
  <button id="replay">↻ 처음부터</button>
  <button id="sound">🔊 소리 켜기</button>
</div>
<div class="note">최종 클립 7개를 순서대로 자동 재생 + 자막. 흐름·길이 확인용 러프 미리보기 (최종 mp4 아님). 실제 영상은 캡컷에 같은 순서로 올리고 자막·TTS 얹으면 끝.</div>

<script>
const B = "https://d8j0ntlcm91z4.cloudfront.net/user_39y71dQ0KqucXYNz0FSqB3uV3QW/";
const CLIPS = [
  {src:"hf_20260624_013551_877787c7-f5e5-473b-80f3-74776fece27d.mp4", cut:3.2, cap:"천만원 인테리어? → 2만원 조명", vo:"천만원 인테리어요? 저는 이 조명 하나로 끝냈습니다."},
  {src:"hf_20260624_224350_aaf95255-bf27-4aca-83de-f3fdc7c7ea42.mp4", cut:2.8, cap:"범인은 가구가 아니라 조명", vo:"집이 휑한 거, 가구 문제가 아니에요. 진짜 범인은 조명이에요."},
  {src:"hf_20260624_232137_7b825238-4af9-448e-948f-e4af4ff5958b.mp4", cut:2.8, cap:"구석이 갤러리가 됨", vo:"이거 하나 놓고 켰을 뿐인데… 구석이 갤러리가 됐어요."},
  {src:"hf_20260624_051941_e9ee98d1-1db6-4a59-b068-e6d4bd3bf65f.mp4", cut:2.6, cap:"어디든 툭 · 충전식", vo:""},
  {src:"hf_20260624_040036_c2cde326-0d6e-4d04-835c-5a2908f1e03e.mp4", cut:2.8, cap:"✨ 마법같은 리모트", vo:"마법같이 편리한 리모트… 자꾸 만지게 돼요 ㅋㅋ"},
  {src:"hf_20260624_164209_70300f17-8b12-4b50-af16-a90558178af9.mp4", cut:4.4, cap:"방 전체가 이렇게", vo:""},
  {src:"hf_20260624_155257_66cb7f94-7ff2-4ad0-a9bf-fb23a3c9e6ff.mp4", cut:4.0, cap:"댓글 '조명' → 링크 DM", vo:"방 분위기, 진짜 2만원이면 끝나요. 댓글에 '조명' 남기면 보내드려요."},
];

const v=document.getElementById('v'), cap=document.getElementById('cap'), vo=document.getElementById('vo');
const bars=document.getElementById('bars'), startEl=document.getElementById('start');
let i=0;
CLIPS.forEach(()=>{const b=document.createElement('div');b.className='b';b.innerHTML='<div class="f"></div>';bars.appendChild(b);});
const fills=[...document.querySelectorAll('#bars .f')];

function load(n){
  i=n;
  if(i>=CLIPS.length){ fills.forEach(f=>f.style.width='0'); i=0; }
  const c=CLIPS[i];
  v.src=B+c.src;
  cap.innerHTML='<span class="pill">'+c.cap+'</span>';
  vo.textContent=c.vo||'';
  fills.forEach((f,k)=>f.style.width = k<i?'100%':'0');
  v.currentTime=0; v.play().catch(()=>{});
}
v.addEventListener('timeupdate',()=>{
  const c=CLIPS[i]; if(!c)return;
  const p=Math.min(v.currentTime/c.cut,1);
  if(fills[i]) fills[i].style.width=(p*100)+'%';
  if(v.currentTime>=c.cut){ next(); }
});
v.addEventListener('ended',next);
function next(){ if(i+1<CLIPS.length){ load(i+1);} else { fills.forEach(f=>f.style.width='100%'); v.pause(); } }
startEl.addEventListener('click',()=>{ startEl.style.display='none'; load(0); });
document.getElementById('replay').onclick=()=>{ load(0); };
document.getElementById('sound').onclick=(e)=>{ v.muted=!v.muted; e.target.textContent=v.muted?'🔊 소리 켜기':'🔇 소리 끄기'; };
</script>
</body>
</html>
